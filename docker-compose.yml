# Séance 14 / 17 - Stack complète : MLflow + Train + API + Frontend + Airflow
#
# Commandes :
#   docker compose up -d mlflow
#   docker compose --profile train run --rm train
#   docker compose up -d api frontend
#   docker compose up -d airflow
#   -> API      : http://localhost:8000
#   -> Frontend : http://localhost:8501
#   -> MLflow   : http://localhost:5001
#   -> Airflow  : http://localhost:8080

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: "changeme-in-production"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  MLFLOW_TRACKING_URI: http://mlflow:5000
  API_URL: http://api:8000
  PYTHONPATH: /opt/airflow

services:

  # ---------------------------------------------------------------------------
  # MLflow
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "0.0.0.0:5001:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Train (one-shot)
  # ---------------------------------------------------------------------------
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - models_data:/app/models
      - ./data:/app/data:ro
    profiles:
      - train

  # ---------------------------------------------------------------------------
  # API FastAPI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_VERSION: "latest"
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - models_data:/app/models:ro
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Frontend Streamlit
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Airflow — webserver + scheduler dans un seul conteneur (mode standalone)
  # ---------------------------------------------------------------------------
  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    restart: unless-stopped
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin --password admin
          --firstname Admin --lastname User
          --role Admin --email admin@example.com || true &&
        airflow scheduler &
        airflow webserver --port 8080
      "
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      <<: *airflow-env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data:ro
      - models_data:/opt/airflow/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  mlflow_data:
  models_data:
  airflow_data: