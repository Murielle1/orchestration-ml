# TP Séance 19 - Livraison continue (CD) avec GitHub Actions
#
# Sur push sur main et sur les tags vX.Y.Z, construit et pousse
# l'image Docker de l'API sur GHCR (ghcr.io).

name: CD

# S19-1 : déclenchement sur push main ET tags de version vX.Y.Z
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Pas d'annulation en cours : on ne veut pas interrompre une livraison.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-push:
    name: Build & push de l'image API (GHCR)
    runs-on: ubuntu-latest

    # S19-2 : permission d'écrire des packages sur GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      # S19-3 : connexion à GHCR
      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # S19-4 : calcul des tags et labels
      - name: Calcul des tags et labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mlproject-api
          tags: |
            # latest sur la branche par défaut
            type=raw,value=latest,enable={{is_default_branch}}
            # SHA court du commit (ex: sha-a1b2c3d)
            type=sha,prefix=sha-
            # version sémantique sur les tags (ex: v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # S19-5 : build et push de l'image
      - name: Build & push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache GitHub Actions pour accélérer les builds suivants
          cache-from: type=gha
          cache-to: type=gha,mode=max