# TP Séance 18 - Intégration continue (CI) avec GitHub Actions
#
# Placez ce fichier dans .github/workflows/ à la RACINE de votre dépôt.
# Pipeline : qualité du code (lint + types + tests) → entraînement baseline
#
# Dataset : Airline Passenger Satisfaction
# Package : src/

name: CI

# S18-1 : déclenchement sur push, pull_request et manuellement
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Annule un run en cours si on repousse sur la même ref (économise des minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Permissions minimales par défaut.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Qualité : lint (ruff) + types (mypy) + tests (pytest)
  # ---------------------------------------------------------------------------
  quality:
    name: Qualité (lint + types + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # S18-2 : installation du projet + outils dev
      - name: Installation des dépendances (projet + dev)
        run: uv sync --extra dev

      # S18-3 : lint
      - name: Lint (ruff check)
        run: uv run ruff check src

      # Formatage (vérifie sans modifier)
      - name: Format (ruff format --check)
        run: uv run ruff format --check src

      # S18-4 : types
      - name: Types (mypy)
        run: uv run mypy src --explicit-package-bases

      # S18-5 : tests
      # - name: Tests (pytest)
      #   run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # 2. Entraînement : entraîne la baseline et publie le modèle en artefact
  # ---------------------------------------------------------------------------
  train:
    name: Entraînement (Continuous Training)
    runs-on: ubuntu-latest
    # S18-6 : ce job ne s'exécute QUE si quality est vert
    needs: quality

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances
        run: uv sync

      # S18-7 : préparation des données + entraînement
      - name: Téléchargement du dataset (Kaggle)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          uv run pip install kaggle --quiet
          mkdir -p data/
          uv run kaggle datasets download \
            -d teejmahal20/airline-passenger-satisfaction \
            --path data/ --unzip

      - name: Entraînement de la baseline
        env:
          # Mode local : pas de serveur MLflow en CI, on stocke dans mlruns/
          MLFLOW_TRACKING_URI: "sqlite:///mlruns.db"
          MLFLOW_ALLOW_FILE_STORE: "false"
        run: uv run python -m src.train --c 1.0 --max-iter 1000
      # S18-8 : publication du modèle en artefact téléchargeable
      - name: Publication du modèle en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          retention-days: 7   # conservé 7 jours